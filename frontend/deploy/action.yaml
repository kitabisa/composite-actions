name: "Frontend deploy"
description: "Frontend composite deployment"

inputs:
  # Required
  docker_username:
    required: false
    description: "docker username"
    type: string

  docker_password:
    required: false
    description: "docker password"
    type: string

  artifact_registry_host:
    required: true
    description: "Artifact registry host"
    type: string

  artifact_registry_project_id:
    required: true
    description: "Artifact registry project id"
    type: string

  credentials_json:
    required: true
    description: "GCP credentials services account"
    type: string

  project_id:
    required: true
    description: "GCP project id"
    type: string

  gke_cluster_name:
    required: true
    description: "GKE cluster name"
    type: string

  gke_cluster_zone:
    required: true
    description: "GKE cluster location zone"
    type: string

  deploy_test:
    required: false
    description: "Run make deploy-test"
    default: "false"
    type: string

  preview_url:
    required: false
    description: "Manual input preview url"
    default: ""
    type: string

  working_directory:
    required: false
    description: "Set working directory"
    default: "."
    type: string

  prune:
    required: false
    description: "Run make prune"
    default: false
    type: string

runs:
  using: "composite"
  steps:
    - name: Checking out repository
      uses: actions/checkout@v4

    - name: Setup Dockerhub credentials
      if: ${{ inputs.docker_username != '' && inputs.docker_password != '' }}
      uses: kitabisa/composite-actions/infra/tools/dockerhub-credential@v2
      with:
        docker_username: ${{ inputs.docker_username }}
        docker_password: ${{ inputs.docker_password }}

    - name: Setup Gcloud credential
      uses: kitabisa/composite-actions/infra/tools/gcloud@v2
      with:
        artifact_registry_host: ${{ inputs.artifact_registry_host }}
        credentials_json: ${{ inputs.credentials_json }}
        project_id: ${{ inputs.project_id }}
        gke_cluster_name: ${{ inputs.gke_cluster_name }}
        gke_cluster_zone: ${{ inputs.gke_cluster_zone }}

    - name: Deploy & Prune
      uses: kitabisa/composite-actions/infra/tools/makefile@v2
      with:
        working_directory: ${{ inputs.working_directory }}
        project_id: ${{ inputs.project_id }}
        artifact_registry_host: ${{ inputs.artifact_registry_host }}
        artifact_registry_project_id: ${{ inputs.artifact_registry_project_id }}
        deploy_test: ${{ inputs.deploy_test }}
        prune: ${{ inputs.prune }}
        deploy: true

    - name: Comment preview url
      if: ${{ inputs.preview_url != '' && github.event.pull_request.number != '' }}
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          Open the application by accessing these URL: [${{ inputs.preview_url }}](https://${{ inputs.preview_url }})

    - name: Get URL
      if: ${{ inputs.preview_url == '' && github.event.pull_request.number != '' }}
      id: get-url
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      run: |
        set -e
        set -o pipefail
        set -u

        APP_NAME=$(make get-app-name)
        PR_NUMBER="${{ github.event.pull_request.number }}"

        echo "App name: $APP_NAME"
        echo "PR number: ${PR_NUMBER:-<empty>}"

        # Get routes safely (do not fail if grep finds nothing)
        UNFORMATTED_ROUTES=$(
          kubectl get httproutes --namespace "$APP_NAME" \
            -o jsonpath='{range .items[*]}{.spec.hostnames[*]}{"\n"}{end}' 2>/dev/null \
          | grep -E "$PR_NUMBER" || true
        )

        # Remove duplicates safely
        UNFORMATTED_ROUTES=$(echo "$UNFORMATTED_ROUTES" | uniq || true)

        # Convert space separated hostnames to newline
        ROUTES=$(echo "$UNFORMATTED_ROUTES" | tr ' ' '\n' || true)

        # If no routes found, exit safely
        if [ -z "$ROUTES" ]; then
          echo "No routes found for PR $PR_NUMBER"
          {
            echo "comment<<EOF"
            echo "No preview URL available."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Routes found:"
        echo "$ROUTES"

        COMMENT="Open the application by accessing these URL: \n"
        HAS_PUBLIC=false
        HAS_PRIVATE=false

        # First pass — detect what types exist
        while read -r line; do
          [ -z "$line" ] && continue

          if [[ "$line" == *.xyz || "$line" == *.com ]]; then
            HAS_PUBLIC=true
          elif [[ "$line" == *.kt.bs || "$line" == *.kt.jg || "$line" == *.kt.bl ]]; then
            HAS_PRIVATE=true
          fi
        done <<< "$ROUTES"

        # Reset comment header if needed
        if [[ "$HAS_PUBLIC" == true || "$HAS_PRIVATE" == true ]]; then
          COMMENT="Open the application by accessing these URLs: \n"
        fi

        # Second pass — build comment safely
        while read -r line; do
          [ -z "$line" ] && continue

          if [[ "$HAS_PUBLIC" == true && "$HAS_PRIVATE" == true ]]; then
            # If both exist → only show public
            if [[ "$line" == *.xyz || "$line" == *.com ]]; then
              COMMENT+="[$line](https://$line)\n"
            fi
          elif [[ "$HAS_PRIVATE" == true ]]; then
            if [[ "$line" == *.kt.bs || "$line" == *.kt.jg || "$line" == *.kt.bl ]]; then
              COMMENT+="[$line](http://$line)\n"
            fi
          elif [[ "$HAS_PUBLIC" == true ]]; then
            if [[ "$line" == *.xyz || "$line" == *.com ]]; then
              COMMENT+="[$line](https://$line)\n"
            fi
          fi
        done <<< "$ROUTES"

        # Final safety fallback
        if [ -z "$COMMENT" ]; then
          COMMENT="No preview URL available."
        fi

        # Set output safely
        {
          echo "comment<<EOF"
          echo -e "$COMMENT"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

        echo "Comment generated successfully."

    - name: Comment preview url
      if: ${{ steps.get-url.outputs.comment != '' && github.event.pull_request.number != '' }}
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: ${{ steps.get-url.outputs.comment }}
